databases:
  - name: plantoide-db
    user: admin
    plan: free
    ipAllowList: []

services:
  - type: web
    name: plantoide
    runtime: python
    plan: free
    buildCommand: "pip install uv && uv sync"
    startCommand: "uv run uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: plantoide-db
          property: connectionString
